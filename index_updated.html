<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Сейф</title><style>body{margin:0;background:#f2f2f2;font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;height:100vh}.card{background:#fff;padding:30px;border-radius:16px;box-shadow:0 8px 25px rgba(0,0,0,.15);width:320px;text-align:center}input{font-size:32px;text-align:center;width:180px;padding:10px;border:2px solid #888;border-radius:10px;letter-spacing:8px}button{margin-top:18px;padding:12px 24px;font-size:18px;border:none;border-radius:10px;background:#2d7ef7;color:#fff;cursor:pointer}#error{color:#c00;font-weight:bold;margin-top:12px;height:20px}#result{display:none}</style></head><body><div class="card" id="login"><h1>🔒 СЕЙФ</h1><p>Введите 4-значный код</p><input id="code" maxlength="4" inputmode="numeric" autocomplete="off"><br><button onclick="checkCode()">Открыть</button><div id="error"></div></div><div class="card" id="result"><h1>✅ Код верный!</h1><p style="font-size:18px;line-height:1.6">Вы молодцы. Что-то в автомобилях вы понимаете.<br><br>А теперь проверим ваше знание Праги.<br><br>Чтобы найти следующую локацию квеста, надо приехать туда, где вы впервые увидели Сашу на канале <b>Dáme Auto</b>.<br><br><b>Удачи в поисках!</b></p></div><script>const valid=["1473","5863","3458","1237","4619"];const inp=document.getElementById("code");inp.addEventListener("input",()=>{inp.value=inp.value.replace(/\D/g,"").slice(0,4)});inp.addEventListener("keydown",e=>{if(e.key==="Enter")checkCode()});function checkCode(){if(valid.includes(inp.value)){document.getElementById("login").style.display="none";document.getElementById("result").style.display="block"}else{document.getElementById("error").textContent="❌ Неверный код";}}</script></body></html>
