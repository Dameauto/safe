<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Сейф</title><style>body{font-family:Arial;background:#f4f4f4;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}.box{background:#fff;padding:30px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.15);text-align:center;max-width:420px}input{width:42px;height:48px;font-size:28px;text-align:center;margin:4px}button{margin-top:18px;padding:10px 20px}#result{margin-top:20px;white-space:pre-line}.ok{color:#0a7d22}.err{color:#b00020}</style></head><body><div class="box"><h2>🔒 Введите код</h2><input id=d1 maxlength=1 inputmode=numeric><input id=d2 maxlength=1 inputmode=numeric><input id=d3 maxlength=1 inputmode=numeric><input id=d4 maxlength=1 inputmode=numeric><br><button onclick="check()">Открыть</button><div id=result></div></div><script>const codes=["1473","5863","3458","1237","4619"];document.querySelectorAll("input").forEach((e,i,a)=>e.oninput=()=>{e.value=e.value.replace(/\D/g,"");if(e.value&&i<3)a[i+1].focus();});function check(){let c=[d1.value,d2.value,d3.value,d4.value].join("");let r=result;if(codes.includes(c)){r.className="ok";r.innerHTML="<h3>✅ Код верный!</h3><p><b>Вы молодцы.</b> Что-то в автомобилях вы понимаете.</p><p>А теперь проверим ваше знание Праги.</p><p>Чтобы найти следующую локацию квеста, надо приехать туда, где вы впервые увидели Сашу на канале Dáme Auto.</p><p><b>Удачи в поисках!</b></p>";}else{r.className="err";r.textContent="❌ Неверный код";}}</script></body></html>
